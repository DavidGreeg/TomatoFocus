<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blocked for Now</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-1: #3a140f;
      --bg-2: #5d1f17;
      --accent: #ff6a4d;
      --accent-soft: #ff9e84;
      --text: #f8fafc;
      --muted: #cbd5e1;
      --chip: rgba(255, 106, 77, 0.2);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(255, 106, 77, 0.26), transparent 42%),
        radial-gradient(circle at bottom, rgba(255, 40, 0, 0.22), transparent 40%),
        linear-gradient(180deg, var(--bg-2), var(--bg-1));
      overflow: hidden;
    }

    .card {
      width: min(760px, calc(100vw - 2rem));
      text-align: center;
      padding: 2.5rem 1.4rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(15, 23, 42, 0.28);
      backdrop-filter: blur(6px);
      border-radius: 1.25rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    .emoji {
      font-size: clamp(3rem, 8vw, 5rem);
      margin-bottom: 0.5rem;
      filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.45));
    }

    .tag {
      display: inline-block;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 0.35rem 0.7rem;
      border-radius: 999px;
      background: var(--chip);
      color: var(--accent-soft);
      margin-bottom: 0.85rem;
    }

    h1 {
      font-size: clamp(1.6rem, 5vw, 2.6rem);
      line-height: 1.15;
      margin: 0 0 0.75rem;
    }

    p {
      margin: 0 auto;
      max-width: 52ch;
      color: var(--muted);
      line-height: 1.6;
      font-size: clamp(0.95rem, 2.5vw, 1.1rem);
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="emoji" aria-hidden="true">⛔🍅</div>
    <div class="tag">Site Redirected</div>
    <h1>Not this one. Back to your goals.</h1>
    <p>This page is blocked right now so future-you has a better shot at getting things done.</p>
  </main>
</body>
</html>
