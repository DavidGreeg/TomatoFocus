<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Using Tailwind CSS for modern styling -->
  <!-- <script src="https://cdn.tailwindcss.com"></script> -->
  <link rel="stylesheet" href="popup_tailwind.css">
  <link rel="stylesheet" href="popup.css" />
  <title>TomatoFocus</title>
</head>
<body class="bg-slate-100">

  <div id="app-container" class="flex w-[480px] h-[400px]">
    <!-- Left Navigation Bar -->
    <nav class="w-1/3 bg-tomato-800 p-2 text-white flex flex-col">
      <h1 class="text-ll font-bold mb-6 mt-2 text-justcreamy flex items-center">
        <img src="icons/logo40.png" alt="TomatoFocus logo" class="logoimg mr-1"/>TomatoFocus</h1>
      <button id="nav-pomodoro" class="nav-button text-left w-full p-2 rounded-md font-semibold transition-colors">
		Pomodoro
      </button>
      <button id="nav-website-block" class="nav-button list-button text-left w-full p-2 rounded-md font-semibold mt-2 transition-colors" aria-expanded="false">
        <span>Website Block</span>
        <span class="list-button-arrow" aria-hidden="true"></span>
      </button>
      <div id="website-block-list" class="subnav-list hidden mt-1 space-y-1">
        <button id="nav-sites-list" class="subnav-button text-left w-full p-2 rounded-md font-semibold mt-2 transition-colors">
          Sites List
        </button>
        <button id="nav-time-schedule" class="subnav-button text-left w-full p-2 rounded-md font-semibold mt-2 transition-colors">
          Time Schedule
        </button>
      </div>
      <button id="nav-habit-tracker" class="nav-button text-left w-full p-2 rounded-md font-semibold mt-2 transition-colors">
		Habit Tracker
      </button>
      <button id="nav-settings" class="settings-nav-button text-left w-full p-2 mt-auto transition-colors">
        <img id="settings-nav-icon" src="icons/settings-icon.svg" alt="Settings icon" class="settings-nav-icon mr-2"/>
        <span>Settings</span>
      </button>
    </nav>

    <!-- Right Content Area -->
    <main class="w-2/3 p-6 bg-white overflow-y-auto">
      <!-- Pomodoro View -->
      <div id="pomodoro-view" class="view">
        <h1 id="mode" class="text-4xl font-bold text-center text-slate-700">Work</h1>
        <div id="timer" class="text-6xl font-mono text-center my-4 text-slate-800">25:00</div>
        <div class="flex justify-center space-x-4 mb-4">
          <button id="startPause" class="control-button">Start</button>
          <button id="reset" class="control-button">Reset</button>
        </div>
        <details class="settings-details">
          <summary class="font-semibold cursor-pointer text-slate-600">⚙️ Settings</summary>
          <div class="mt-2 p-3 bg-slate-50 rounded-lg border">
            <label class="setting-label">Work (min): <input type="number" id="workMinutes" min="1" value="25" class="setting-input"></label>
            <label class="setting-label">Break (min): <input type="number" id="breakMinutes" min="1" value="5" class="setting-input"></label>
            <label class="setting-label">Cycles: <input type="number" id="cycles" min="1" value="4" class="setting-input"></label>
            <div class="mt-2">
              <label class="flex items-center"><input type="checkbox" id="enableLongBreak" checked class="mr-2"> Enable Long break</label>
            </div>
            <div id="longBreakSettings" class="mt-2 space-y-2">
              <label class="setting-label">Long Break (min): <input type="number" id="longBreak" min="1" value="15" class="setting-input"></label>
              <label class="setting-label">After (cycles): <input type="number" id="longBreakEvery" min="1" value="4" class="setting-input"></label>
            </div>
            <button id="saveSettings" class="w-full mt-4 bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 transition-colors">Save Settings</button>
            <!-- Intended for future usage. Keeping this control in markup for later re-enable. -->
            <button id="testSound" class="hidden w-full mt-2 bg-gray-200 py-2 rounded-md hover:bg-gray-300 transition-colors">Test Alarm Sound</button>
          </div>
        </details>
      </div>

      <!-- Website Blocker View -->
      <div id="sites-list-view" class="view hidden">
        <h2 class="text-2xl font-bold text-slate-700 mb-4">Sites List</h2>
        <div class="mb-4">
          <p class="text-sm text-slate-500 mb-2"></p>
		  <p class="blocker-note mb-2">The list below starts with a few default sites. Remove any you don't need.<button id="dismiss-note" class="note-dismiss" aria-label="Dismiss">&times;</button></p>
          <div id="site-input-row" class="flex space-x-2 items-center">
            <button id="toggle-regex-button" class="toggle-regex-button hidden" type="button">regex</button>
            <input type="text" id="new-site-input" placeholder="e.g., distracting.com" class="flex-grow p-2 border rounded-md focus:ring-2 focus:ring-blue-500 focus:outline-none">
            <button id="input-mode-toggle" class="mode-toggle-button">WWW</button>
            <button id="add-site-button" class="add-site-button">Add</button>
          </div>
        </div>
        <div>
          <h3 class="text-lg font-semibold text-slate-600 mb-2">Blocked Websites</h3>
          <ul id="blocked-sites-list" class="space-y-2">
            <!-- Blocked sites will be dynamically inserted here -->
          </ul>
        </div>
      </div>

      <!-- Time Schedule View -->
      <div id="time-schedule-view" class="view hidden">
        <h2 class="text-2xl font-bold text-slate-700 mb-4">Time Schedule</h2>
        <p id="schedule-note" class="blocker-note mb-2">Here you should add the time intervals when websites should be blocked.<button id="dismiss-schedule-note" class="note-dismiss" aria-label="Dismiss">&times;</button></p>
        <div id="time-interval-error" class="hidden p-2 mb-2 rounded-md bg-red-100 text-red-700 text-sm"></div>
        <div class="grid grid-cols-2 gap-2 mb-3">
          <label class="text-sm text-slate-600">From:
            <input id="time-a-input" type="time" step="600" class="w-quarter p-2 border rounded-md mt-1">
          </label>
		  &nbsp;&nbsp;
          <label class="text-sm text-slate-600">To:
            <input id="time-b-input" type="time" step="600" class="w-quarter p-2 border rounded-md mt-1">
          </label>
		  &nbsp;&nbsp;
          <button id="add-time-interval" class="add-site-button">Add</button>
        </div>

        <div class="mt-4">
          <h3 class="text-lg font-semibold text-slate-600 mb-2">Blocked Intervals</h3>
          <ul id="time-interval-list" class="space-y-2"></ul>
        </div>
      </div>

      <div id="settings-view" class="view hidden">
        <h2 class="text-2xl font-bold text-slate-700 mb-4">Settings</h2>
        <label class="flex items-center gap-2 text-sm text-slate-700 mb-3">
          <input id="enable-user-password" type="checkbox">
          Activate user password
        </label>
        <div id="password-settings" class="space-y-2 hidden">
          <label class="setting-label">Password:
            <input id="user-password-input" type="password" class="setting-input" autocomplete="new-password">
          </label>
          <button id="save-password" class="add-site-button">Save</button>
        </div>
      </div>
    </main>
  </div>

  <script src="popup.js"></script>
</body>
</html>
